name: Deploy to Hetzner FTP

# Push to main → automatisch nach beta/ auf irrlichter.net
# Manuell: Actions → Run workflow (beta oder production)
# Secrets: FTP_HOST, FTP_USER, FTP_PASSWORD (optional: FTP_REMOTE_DIR für production)
on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      target:
        description: Deploy-Ziel
        required: true
        default: beta
        type: choice
        options:
          - beta
          - production

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install lftp
        run: sudo apt-get update && sudo apt-get install -y lftp

      - name: Deploy via FTP
        env:
          FTP_HOST: ${{ secrets.FTP_HOST }}
          FTP_USER: ${{ secrets.FTP_USER }}
          FTP_PASSWORD: ${{ secrets.FTP_PASSWORD }}
          FTP_REMOTE_DIR: ${{ github.event_name == 'push' && 'beta' || (inputs.target == 'beta' && 'beta' || (secrets.FTP_REMOTE_DIR || '.')) }}
          INCLUDE_ADMIN: "0"
        run: bash scripts/deploy-ftp.sh
