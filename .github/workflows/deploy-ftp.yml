name: Deploy to Hetzner FTP

# Auto-deploy on push is paused — run manually from the Actions tab.
# Store FTP_HOST, FTP_USER, FTP_PASSWORD in GitHub Secrets (never in this file).
on:
  workflow_dispatch:
    inputs:
      target:
        description: Deploy-Ziel
        required: true
        default: beta
        type: choice
        options:
          - beta
          - production

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install lftp
        run: sudo apt-get update && sudo apt-get install -y lftp

      - name: Deploy via FTP
        env:
          FTP_HOST: ${{ secrets.FTP_HOST }}
          FTP_USER: ${{ secrets.FTP_USER }}
          FTP_PASSWORD: ${{ secrets.FTP_PASSWORD }}
          FTP_REMOTE_DIR: ${{ inputs.target == 'beta' && 'beta' || (secrets.FTP_REMOTE_DIR || '.') }}
          INCLUDE_ADMIN: "0"
        run: bash scripts/deploy-ftp.sh
