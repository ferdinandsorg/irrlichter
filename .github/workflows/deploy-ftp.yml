name: Deploy to Hetzner FTP

# Push to main → automatisch Production (Document Root)
# Staging (/beta/): Actions → Run workflow → target „beta“
# Secrets: FTP_HOST, FTP_USER, FTP_PASSWORD
# Optional: FTP_REMOTE_DIR (Production, Standard: .)
on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      target:
        description: Deploy-Ziel
        required: true
        default: production
        type: choice
        options:
          - beta
          - production

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install lftp
        run: sudo apt-get update && sudo apt-get install -y lftp

      - name: Deploy via FTP
        env:
          FTP_HOST: ${{ secrets.FTP_HOST }}
          FTP_USER: ${{ secrets.FTP_USER }}
          FTP_PASSWORD: ${{ secrets.FTP_PASSWORD }}
          FTP_REMOTE_DIR: ${{ github.event_name == 'workflow_dispatch' && inputs.target == 'beta' && 'beta' || (secrets.FTP_REMOTE_DIR || '.') }}
        run: bash scripts/deploy-ftp.sh
